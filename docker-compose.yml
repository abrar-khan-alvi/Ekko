    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ekkoloop_db
      - POSTGRES_USER=ekko_user
      - POSTGRES_PASSWORD=ekko_pass
    ports:
      - "5432:5432"

  backend:
    build: ./backend
